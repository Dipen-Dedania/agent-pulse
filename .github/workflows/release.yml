name: Build Distribution

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (no leading v, e.g. 1.2.3). Must match package.json.'
        required: true
        type: string
      prerelease:
        description: 'Mark this release as a prerelease'
        required: false
        type: boolean
        default: false

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: dist:win
            artifact_path: |
              release/*.exe
              release/*.exe.blockmap
              release/latest.yml
          - os: macos-latest
            script: dist:mac
            artifact_path: |
              release/*.dmg
              release/*.dmg.blockmap
              release/latest-mac.yml

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # Guard: when shipping via the Run-workflow button, refuse to publish
      # if the typed version doesn't match package.json. Cheap insurance
      # against typos that would otherwise create a v9.9.9 tag with a
      # 1.0.0 installer inside.
      - name: Verify version matches package.json
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "${{ inputs.version }}" ]; then
            echo "::error::package.json says $PKG_VERSION but workflow input is ${{ inputs.version }}"
            exit 1
          fi

      - name: Build distribution
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run ${{ matrix.script }}

      # Publishes to a real GitHub Release on either a v* tag push (legacy)
      # or a workflow_dispatch run. tag_name picks the right value for each:
      # the input on manual runs, the pushed ref otherwise. The action
      # creates the tag if it doesn't yet exist (points it at HEAD of the
      # chosen branch).
      - name: Publish to GitHub Release
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref_name }}
          files: ${{ matrix.artifact_path }}
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
