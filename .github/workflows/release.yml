name: Build Distribution

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (no leading v, e.g. 1.2.3). Must match package.json.'
        required: true
        type: string
      prerelease:
        description: 'Mark this release as a prerelease'
        required: false
        type: boolean
        default: false

# UPDATE_PROVIDER drives which feed gets baked into the packaged app's
# app-update.yml. Default is firebase; set to "github" only if you ever
# want to ship a build whose auto-updater reads from the GitHub repo.
# The GitHub Release publish below runs regardless — it's for changelog
# visibility, not for serving updates.
env:
  UPDATE_PROVIDER: firebase
  FIREBASE_BUCKET: bitsy-cc3f6.firebasestorage.app
  FIREBASE_PREFIX: agent-pulse/releases

jobs:
  build:
    permissions:
      contents: write
      id-token: write   # reserved for future workload-identity-federation
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: dist:win
            artifact_path: |
              release/*.exe
              release/*.exe.blockmap
              release/latest.yml
            # minimatch (used by upload-cloud-storage) wants brace
            # expansion — comma-separated would silently match nothing.
            binary_glob: '*.{exe,exe.blockmap}'
            manifest_glob: 'latest.yml'
          - os: macos-latest
            script: dist:mac
            artifact_path: |
              release/*.dmg
              release/*.dmg.blockmap
              release/latest-mac.yml
            binary_glob: '*.{dmg,dmg.blockmap}'
            manifest_glob: 'latest-mac.yml'
          - os: ubuntu-latest
            script: dist:linux
            # AppImage embeds its differential-update blockmap inside the
            # image itself — electron-builder emits no standalone
            # *.AppImage.blockmap, so don't list one (it would fail the
            # publish step's fail_on_unmatched_files guard).
            artifact_path: |
              release/*.AppImage
              release/latest-linux.yml
            binary_glob: '*.AppImage'
            manifest_glob: 'latest-linux.yml'

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 22 is required: @electron/rebuild needs >=22.12.0, and
          # better-sqlite3 only ships prebuilt binaries for win32-x64 from
          # Node 22 onward. On Node 20 the install falls back to node-gyp,
          # which fails on the windows-latest image because it can't detect
          # the bundled Visual Studio 18 toolchain.
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # Guard: when shipping via the Run-workflow button, refuse to publish
      # if the typed version doesn't match package.json. Cheap insurance
      # against typos that would otherwise create a v9.9.9 tag with a
      # 1.0.0 installer inside.
      - name: Verify version matches package.json
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "${{ inputs.version }}" ]; then
            echo "::error::package.json says $PKG_VERSION but workflow input is ${{ inputs.version }}"
            exit 1
          fi

      - name: Build distribution
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run ${{ matrix.script }}

      # Attach the built installer to the workflow run so any build — including
      # plain main-branch pushes that never publish — can be downloaded and
      # smoke-tested on a real machine. This does NOT touch the update feed.
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: agent-pulse-${{ matrix.os }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 5

      # ── Firebase Storage upload (the real update feed) ──────────────────
      # Only runs on actual release events; main-branch verification builds
      # don't upload to avoid clobbering the latest.yml for current users.
      - name: Authenticate to Google Cloud
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Installer + blockmap MUST land before latest.yml. If clients see
      # latest.yml first they'll request a binary that isn't there yet.
      - name: Upload installers to Firebase Storage
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: release
          glob: ${{ matrix.binary_glob }}
          destination: ${{ env.FIREBASE_BUCKET }}/${{ env.FIREBASE_PREFIX }}
          parent: false

      # latest.yml uploaded last with no-cache so clients see a new release
      # immediately. Without this header, GCS's default 1h cache delays
      # visibility for everyone behind a CDN edge.
      - name: Upload update manifest to Firebase Storage
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: release
          glob: ${{ matrix.manifest_glob }}
          destination: ${{ env.FIREBASE_BUCKET }}/${{ env.FIREBASE_PREFIX }}
          parent: false
          headers: |-
            cache-control: no-cache, max-age=0

      # ── GitHub Release publish (changelog visibility, not for updates) ──
      # Kept around so users have a human-readable releases page. Auto-
      # update bypasses this and reads from Firebase.
      - name: Publish to GitHub Release
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref_name }}
          files: ${{ matrix.artifact_path }}
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
