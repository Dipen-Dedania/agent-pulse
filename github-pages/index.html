    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Is Agent Pulse free?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Agent Pulse is open source under AGPLv3. If you want to use it commercially without AGPL obligations, a paid license is available."
            }
          },
          {
            "@type": "Question",
            "name": "Does Agent Pulse send my data anywhere?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. Events flow from local hooks to a local bridge to a local database. The only network calls are the vendors' own usage APIs (with your existing credentials) and the update check."
            }
          },
          {
            "@type": "Question",
            "name": "Which tools does Agent Pulse support?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Claude Code, Cursor, GitHub Copilot (VS Code), OpenAI Codex, Kiro, and Antigravity (CLI + IDE). Hooks install and uninstall with one click each."
            }
          },
          {
            "@type": "Question",
            "name": "How does Agent Pulse know what my agents are doing?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Each tool exposes lifecycle hooks. Agent Pulse writes a small hook config that POSTs events to localhost:4242, and normalizes them into a single state model."
            }
          },
          {
            "@type": "Question",
            "name": "Are the cost numbers my real bill?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No — they're estimates at public API list prices (via a daily-refreshed LiteLLM table), useful for relative comparison. Your subscription bills differently."
            }
          },
          {
            "@type": "Question",
            "name": "Does Agent Pulse modify my tools?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Only their documented hook config files (e.g. ~/.claude/settings.json), and it backs up anything it replaces. Uninstalling a hook restores a clean state."
            }
          },
          {
            "@type": "Question",
            "name": "Does Agent Pulse run on Windows, macOS and Linux?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "All three. Windows gets full auto-update; macOS is manual-update for now; Linux ships as an AppImage."
            }
          }
        ]
      }
    </script>
